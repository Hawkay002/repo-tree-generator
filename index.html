<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Repo Tree Generator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Premium Tree Connecting Lines */
        .tree-list {
            list-style-type: none;
            padding-left: 1.25rem;
            position: relative;
            margin: 0;
        }
        /* Vertical line for children */
        .tree-list::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0.45rem; 
            border-left: 1px solid #30363d; /* Premium dark border color */
            z-index: 1;
        }
        /* Remove vertical line from the very root */
        .tree-container > .tree-list::before {
            display: none;
        }
        
        .tree-node {
            position: relative;
        }
        /* Horizontal branch line */
        .tree-node::before {
            content: '';
            position: absolute;
            top: 0.75rem; 
            left: -0.8rem;
            width: 0.7rem;
            border-top: 1px solid #30363d;
            z-index: 1;
        }
        /* Hide horizontal line for top-level files/folders to keep it clean */
        .tree-container > .tree-list > .tree-node::before {
            display: none;
        }
        /* Fix the trailing line for the last item in a folder */
        .tree-node:last-child::after {
            content: '';
            position: absolute;
            top: 0.75rem;
            bottom: 0;
            left: -0.85rem;
            width: 4px;
            background: #0d1117; /* Matches the premium dark background to cover the line */
            z-index: 2;
        }

        /* Tighter spacing for items */
        .tree-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.15rem 0.25rem;
            cursor: pointer;
            user-select: none;
            position: relative;
            z-index: 10;
            border-radius: 0.25rem;
            transition: background-color 0.15s ease;
        }
        .tree-item:hover {
            background-color: #21262d; /* Subtle dark hover state */
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8 text-gray-800">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-bold mb-4">GitHub Repo Tree Generator</h1>
            
            <div class="flex gap-4 mb-4">
                <input type="text" id="repo-url" 
                       placeholder="e.g., https://github.com/Hawkay002/your-repo" 
                       class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="fetch-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    Generate
                </button>
            </div>

            <div id="controls" class="hidden flex gap-4 border-t pt-4 mt-4">
                <button id="copy-text-btn" class="flex items-center gap-2 text-sm bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">
                    <i class="fa-regular fa-copy"></i> Copy Structure
                </button>
                <button id="export-img-btn" class="flex items-center gap-2 text-sm bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">
                    <i class="fa-solid fa-download"></i> Export as Image
                </button>
                <button id="toggle-all-btn" class="flex items-center gap-2 text-sm bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200 ml-auto">
                    <i class="fa-solid fa-folder-open"></i> Expand/Collapse All
                </button>
            </div>
            
            <div id="error-msg" class="text-red-500 text-sm hidden"></div>
        </div>

        <div class="bg-[#0d1117] text-[#c9d1d9] p-8 rounded-xl shadow-2xl border border-gray-800 overflow-x-auto" id="export-container">
            <div id="tree-root" class="tree-container text-[13px] font-mono leading-tight tracking-tight">
                <div class="text-gray-500 italic">Enter a GitHub repository URL to generate the tree.</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
